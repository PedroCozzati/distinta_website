<div *ngIf="modalService.isBandModalOpen()" class="modal-overlay" style="display: flex;" (click)="modalService.closeModals()">
    <div class="bg-zinc-900 max-w-2xl w-full rounded-2xl p-8 border border-dg relative shadow-2xl" (click)="$event.stopPropagation()">
        <button class="absolute top-4 right-4 text-2xl text-white/50 hover:text-white" (click)="modalService.closeModals()">×</button>
        <div class="flex flex-col md:flex-row gap-8">
            <img [src]="modalService.selectedBand()?.image_url" class="w-full md:w-48 h-48 object-cover rounded-lg border-2 border-dg">
            <div>
                <h3 class="text-3xl font-bold text-dg mb-2">{{ modalService.selectedBand()?.nome_banda }}</h3>
                <p class="text-gray-400 italic mb-6">{{ modalService.selectedBand()?.descricao }}</p>
                <a [href]="modalService.selectedBand()?.link_redes" target="_blank" class="inline-block bg-white/5 px-4 py-2 rounded hover:bg-dg hover:text-black transition"><i class="fab fa-instagram mr-2"></i>Instagram</a>
            </div>
        </div>
    </div>
</div>

<div *ngIf="modalService.isZoomModalOpen()" class="modal-overlay" style="display: flex;" (click)="modalService.closeModals()">
    <div class="relative max-w-5xl w-full" (click)="$event.stopPropagation()">
        <button class="absolute -top-12 right-0 text-4xl text-white hover:text-dg" (click)="modalService.closeModals()">×</button>
        <img [src]="modalService.zoomImageSrc()" class="w-full h-auto rounded-lg shadow-2xl border-2 border-dg">
    </div>
</div>
