<section id="lanches" class="py-20 px-6 max-w-7xl mx-auto scroll-mt">
    <h2 class="text-4xl font-bold italic text-center mb-12">Hamburguers Especiais <span class="text-dg">Da Casa</span></h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        @for (item of dataService.menuItems(); track item.name) {
        <div class="bg-zinc-900 rounded-xl overflow-hidden border border-white/5">
            <img [src]="item.image" class="w-full h-64 object-cover img-bw-to-color">
            <div class="p-6">
                <h4 class="text-2xl font-bold">{{ item.name }}</h4>
                <p class="text-gray-400 text-sm italic mb-6">{{ item.description }}</p>
                <span class="text-2xl font-bold text-dg italic">{{ item.price }}</span>
            </div>
        </div>
        }
    </div>
    <div class="text-center mt-12">
        <a href="https://vercardapio.web.app/distintagarage" target="_blank" rel="noopener noreferrer" class="inline-block border-2 border-white/20 px-12 py-4 rounded-full font-bold uppercase tracking-widest hover:border-dg hover:text-dg active:bg-dg active:text-black active:border-dg transition-all duration-150">
            Ver Cardápio Completo
        </a>
    </div>
</section>
