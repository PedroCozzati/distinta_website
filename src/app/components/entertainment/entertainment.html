<section id="diversao" class="py-20 max-w-7xl mx-auto px-6 scroll-mt">
    <h2 class="text-4xl font-bold italic text-center mb-12">Diversão <span class="text-dg">No Bar</span></h2>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 mb-20">
        @for (item of dataService.entertainmentItems(); track item.name) {
        <div class="text-center group">
            <img [src]="item.image" class="w-full h-44 object-cover rounded-lg img-bw-to-color mb-3">
            <p class="font-bold tracking-widest uppercase text-xs lg:text-sm group-hover:text-dg transition">{{ item.name }}</p>
        </div>
        }
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        @for (event of dataService.scheduleEvents(); track event.title) {
        <div class="bg-zinc-900/50 p-10 rounded-2xl border-l-8 border-dg">
            <h3 class="text-2xl font-bold mb-3">{{ event.title }} ({{ event.day }})</h3>
            <p class="text-gray-400 italic leading-relaxed text-lg">{{ event.description }}</p>
        </div>
        }
    </div>
</section>
