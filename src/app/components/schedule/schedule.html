<section id="programacao" class="py-20 max-w-7xl mx-auto px-6 scroll-mt">
    <h2 class="text-4xl font-bold italic text-center mb-12 uppercase">Programação <span class="text-dg">Semanal</span></h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 text-center">
        @for (item of dataService.scheduleItems(); track item.title) {
        <div (click)="modalService.openZoomModal(item.image)">
            <img [src]="item.image" class="w-full h-64 object-cover rounded-lg mb-4 img-bw-to-color border border-white/10 shadow-lg cursor-pointer">
            <h4 class="font-bold text-lg">{{ item.title }}</h4>
            <p class="text-dg text-sm font-bold">{{ item.subtitle }}</p>
        </div>
        }
    </div>
</section>
